name: Scan Yahoo Stocks

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Optional extra ticker codes, separated by commas or spaces"
        required: false
        default: ""
      count:
        description: "Maximum Yahoo candidates to scan"
        required: false
        default: "300"
      top:
        description: "Number of top results to publish"
        required: false
        default: "100"
      model:
        description: "Model version"
        required: false
        default: "v14"
        type: choice
        options:
          - v14
          - v13
  schedule:
    - cron: "43 8 * * 1-5"

permissions:
  contents: write

concurrency:
  group: yahoo-stock-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Yahoo scanner dependencies
        run: python -m pip install --upgrade yfinance

      - name: Run Yahoo stock scan
        run: |
          python scripts/scan_yahoo_stocks.py \
            --tickers "${{ github.event.inputs.tickers || '' }}" \
            --count "${{ github.event.inputs.count || '300' }}" \
            --top "${{ github.event.inputs.top || '100' }}" \
            --model "${{ github.event.inputs.model || 'v14' }}"

      - name: Commit scan results
        run: |
          if git diff --quiet -- public/data/scan-results.json; then
            echo "No Yahoo scan result changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/scan-results.json
          git commit -m "Refresh Yahoo stock scan results"
          git push
