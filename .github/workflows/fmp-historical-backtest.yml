name: FMP Historical Backtest

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Tickers to fetch. Blank uses current database tickers."
        required: false
        default: ""
      max_tickers:
        description: "Maximum database tickers if tickers is blank"
        required: false
        default: "25"
      top:
        description: "Top-N portfolio size"
        required: false
        default: "10"
      benchmark:
        description: "Benchmark ticker"
        required: false
        default: "SPY"
      model_variant:
        description: "Backtest model: price_only or analyst_price"
        required: false
        default: "price_only"
      min_usable_tickers:
        description: "Fail if fewer tradable stock histories are available"
        required: false
        default: "10"
      transaction_cost_bps:
        description: "Trading cost per one-way turnover in basis points"
        required: false
        default: "10"
      evaluation_start:
        description: "Start of separately reported recent evaluation period"
        required: false
        default: "2024-01-01"

permissions:
  contents: write

concurrency:
  group: fmp-history
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify frozen model contract
        run: python scripts/test_model_contract.py

      - name: Fetch FMP history
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          if [ -z "$FMP_API_KEY" ]; then
            echo "FMP_API_KEY secret is missing. Add it in Settings > Secrets and variables > Actions."
            exit 2
          fi
          python scripts/fetch_fmp_history.py \
            --tickers "${{ github.event.inputs.tickers }}" \
            --max-tickers "${{ github.event.inputs.max_tickers || '25' }}" \
            --benchmark "${{ github.event.inputs.benchmark || 'SPY' }}"

      - name: Commit fetched FMP histories
        run: |
          if git diff --quiet -- public/data/fmp-history; then
            echo "No fetched FMP history changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/fmp-history
          git commit -m "Update FMP historical histories"
          git pull --rebase origin main
          git push

      - name: Run FMP historical backtest
        run: |
          set +e
          python scripts/backtest_fmp_history.py \
            --benchmark "${{ github.event.inputs.benchmark || 'SPY' }}" \
            --top "${{ github.event.inputs.top || '10' }}" \
            --model "${{ github.event.inputs.model_variant || 'price_only' }}" \
            --cost-bps "${{ github.event.inputs.transaction_cost_bps || '10' }}" \
            --evaluation-start "${{ github.event.inputs.evaluation_start || '2024-01-01' }}" \
            --min-tickers "${{ github.event.inputs.min_usable_tickers || '10' }}" \
            --require-benchmark \
            --output public/data/fmp-backtest-results.json \
            --format markdown | tee /tmp/fmp-backtest.md
          status=${PIPESTATUS[0]}
          cat /tmp/fmp-backtest.md >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Commit FMP backtest result
        run: |
          if git diff --quiet -- public/data/fmp-backtest-results.json; then
            echo "No FMP backtest result changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/fmp-backtest-results.json
          git commit -m "Update FMP historical backtest"
          git pull --rebase origin main
          git push
