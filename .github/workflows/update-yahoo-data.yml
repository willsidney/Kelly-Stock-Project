name: Update Yahoo Finance Data

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Optional ticker codes to add, separated by commas or spaces"
        required: false
        default: ""
      mode:
        description: "Refresh type"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - prices
  schedule:
    - cron: "52 6 * * 1-5"
    - cron: "17 8,14,20 * * 1-5"

permissions:
  contents: write

concurrency:
  group: yahoo-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Yahoo updater dependencies
        run: python -m pip install --upgrade yfinance

      - name: Refresh Yahoo data
        run: |
          MODE="${{ github.event.inputs.mode || '' }}"
          if [ -z "$MODE" ]; then
            if [ "${{ github.event.schedule }}" = "52 6 * * 1-5" ]; then
              MODE="full"
            else
              MODE="prices"
            fi
          fi
          TICKERS="${{ github.event.inputs.tickers || '' }}"
          echo "Requested tickers: $TICKERS"
          echo "Refresh mode: $MODE"
          python scripts/update_yahoo_data.py --mode "$MODE" --tickers "$TICKERS"

      - name: Commit refreshed database
        run: |
          if git diff --quiet -- public/data/stocks.json; then
            echo "No Yahoo Finance data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/stocks.json
          git commit -m "Refresh Yahoo Finance stock data"
          git push
