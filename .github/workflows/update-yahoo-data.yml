name: Update Yahoo Finance Data

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Optional ticker codes to add, separated by commas or spaces"
        required: false
        default: ""
  schedule:
    - cron: "17 7 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: yahoo-data-and-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh Yahoo data
        run: |
          echo "Requested tickers: ${{ inputs.tickers }}"
          python scripts/update_yahoo_data.py --tickers "${{ inputs.tickers }}"

      - name: Commit refreshed database
        run: |
          if git diff --quiet -- public/data/stocks.json; then
            echo "No Yahoo Finance data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/stocks.json
          git commit -m "Refresh Yahoo Finance stock data"
          git push

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
