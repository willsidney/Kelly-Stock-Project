name: Update Yahoo Finance Data

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Optional ticker codes to add, separated by commas or spaces"
        required: false
        default: ""
  schedule:
    - cron: "17 7 * * 1-5"

permissions:
  contents: write

concurrency:
  group: yahoo-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh Yahoo data
        run: |
          echo "Requested tickers: ${{ inputs.tickers }}"
          python scripts/update_yahoo_data.py --tickers "${{ inputs.tickers }}"

      - name: Commit refreshed database
        run: |
          if git diff --quiet -- public/data/stocks.json; then
            echo "No Yahoo Finance data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/stocks.json
          git commit -m "Refresh Yahoo Finance stock data"
          git push
